<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun Arda 🎉</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family: Arial;
    background: radial-gradient(circle at top, #ff7eb3, #1a1a2e);
    color:white;
    overflow:hidden;
}

h1 {
    font-size:50px;
    text-shadow:0 0 20px rgba(255,255,255,0.5);
}

.cake {
    width:260px;
    height:140px;
    background: linear-gradient(135deg,#ff4d6d,#ff758c);
    border-radius:20px;
    position:relative;
    margin-top:40px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.candle {
    width:12px;
    height:45px;
    background:white;
    position:absolute;
    top:-45px;
    border-radius:3px;
}

.flame {
    width:12px;
    height:18px;
    background: radial-gradient(circle, yellow, orange);
    border-radius:50%;
    position:absolute;
    top:-18px;
    animation:flicker 0.15s infinite;
}

@keyframes flicker {
    50% { transform:scale(1.3);}
}

#message {
    display:none;
    margin-top:30px;
    font-size:24px;
    text-align:center;
    color:#fff;
}

#levelUp {
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:55px;
    font-weight:bold;
    color:gold;
    text-shadow:0 0 25px rgba(255,215,0,0.8);
}

.show {
    animation:pop 1s forwards;
}

@keyframes pop {
    50% { transform:translate(-50%,-50%) scale(1.6);}
    100% { transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<h1>🎉 İyi ki Doğdun Arda 🎉</h1>

<div class="cake">
    <div class="candle" style="left:50px;"><div class="flame"></div></div>
    <div class="candle" style="left:120px;"><div class="flame"></div></div>
    <div class="candle" style="left:190px;"><div class="flame"></div></div>
</div>

<p>💨 Üfle bakalım... mikrofon seni bekliyo 😏</p>

<div id="message">
😂 Doğum günün kutlu olsun Arda 😂<br>
Artık “genç” kategorisinden “tecrübeli”ye geçtin 😏<br>
Refleksler düşebilir ama karizma sabit 😎
</div>

<div id="levelUp">🎮 LEVEL UP +1</div>

<script>

// SES EFEKTİ
function playSound(){
    let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    audio.play();
}

// MUM SÖNDÜR
function blow(){
    document.querySelectorAll(".flame").forEach(f=>f.style.display="none");
    document.getElementById("message").style.display="block";
    document.getElementById("levelUp").classList.add("show");
    playSound();
}

// MİKROFON
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const mic = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detect(){
        analyser.getByteFrequencyData(data);
        let volume = data.reduce((a,b)=>a+b)/data.length;

        if(volume > 60){
            blow();
        }

        requestAnimationFrame(detect);
    }

    detect();
})
.catch(()=>{
    alert("Mikrofon izni vermezsen üfleyemezsin 😄");
});

</script>

</body>
</html>
