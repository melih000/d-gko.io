<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun Arda 🎉</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family: Arial;
    background: radial-gradient(circle,#ff7eb3,#1a1a2e);
    color:white;
}

h1 {
    font-size:45px;
}

.cake {
    width:250px;
    height:140px;
    background:#ff4d6d;
    border-radius:20px;
    position:relative;
    margin-top:30px;
}

.candle {
    width:12px;
    height:45px;
    background:white;
    position:absolute;
    top:-45px;
}

.flame {
    width:12px;
    height:18px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-18px;
    animation:flicker 0.15s infinite;
}

@keyframes flicker {
    50% { transform:scale(1.3);}
}

#message {
    display:none;
    margin-top:30px;
    font-size:22px;
    text-align:center;
}

#levelUp {
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:45px;
    color:gold;
}

.show {
    animation:pop 1s forwards;
}

@keyframes pop {
    50% { transform:translate(-50%,-50%) scale(1.5);}
    100% { transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<h1>🎉 İyi ki Doğdun Arda 🎉</h1>

<div class="cake">
    <div class="candle" style="left:50px;"><div class="flame"></div></div>
    <div class="candle" style="left:120px;"><div class="flame"></div></div>
    <div class="candle" style="left:190px;"><div class="flame"></div></div>
</div>

<p>💨 Üfle (mikrofon izin ver)</p>

<div id="message">
😂 Doğum günün kutlu olsun Arda 😂<br><br>
21 senedir senin gibi bir gavat dünyaya gelmemiştir.<br>
Ama yine de iyi ki varsın lan 😎🎉
</div>

<div id="levelUp">🎮 LEVEL UP +1</div>

<script>

// SES (İNTERNETSİZ)
function playBeep(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = "square";
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),200);
}

// MUM SÖNDÜR
function blow(){
    document.querySelectorAll(".flame").forEach(f=>f.style.display="none");
    document.getElementById("message").style.display="block";
    document.getElementById("levelUp").classList.add("show");
    playBeep();
}

// MİKROFON
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const mic = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detect(){
        analyser.getByteFrequencyData(data);
        let volume = data.reduce((a,b)=>a+b)/data.length;

        if(volume > 60){
            blow();
        }

        requestAnimationFrame(detect);
    }

    detect();
})
.catch(()=>{
    alert("Mikrofon izni ver kanka yoksa üfleyemezsin 😄");
});

</script>

</body>
</html>
